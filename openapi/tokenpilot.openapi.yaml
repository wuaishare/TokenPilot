openapi: 3.1.0
info:
  title: TokenPilot Local Control Plane API
  version: 0.1.0-alpha
  description: >
    Local-first automation surface for TokenPilot. Phase 1 keeps execution local and
    preserves the existing manual workflow while exposing the future HTTPS control-plane shape.
servers:
  - url: https://tokenpilot.example.com
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        mode:
          type: string
        authRequired:
          type: boolean
        exposed:
          type: boolean
        publicBaseUrl:
          oneOf:
            - type: string
            - type: "null"
        openapiUrl:
          type: string
      required: [ok, mode, authRequired, exposed, publicBaseUrl, openapiUrl]
    GptConfig:
      type: object
      additionalProperties: false
      properties:
        version:
          type: string
        updatedAt:
          type: string
        actionHost:
          type: string
        openapiUrl:
          type: string
        publicBaseUrl:
          oneOf:
            - type: string
            - type: "null"
        schemaImportUrl:
          type: string
        instructions:
          type: string
        notes:
          type: array
          items:
            type: string
      required: [version, updatedAt, actionHost, openapiUrl, publicBaseUrl, schemaImportUrl, instructions, notes]
    GptConfigResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        config:
          $ref: '#/components/schemas/GptConfig'
      required: [ok, config]
    PackJobPayload:
      type: object
      additionalProperties: false
      properties:
        repoId:
          type: string
          description: Public repository alias resolved to a private local path by the operator. Defaults to tokenpilot in the current single-repo local-first setup.
    TaskPackJobPayload:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
        problem:
          type: string
        contextSummary:
          type: string
        mustInspect:
          type: array
          items:
            type: string
        mayInspect:
          type: array
          items:
            type: string
        mustNotModify:
          type: array
          items:
            type: string
        verificationCommands:
          type: array
          items:
            type: string
        acceptanceCriteria:
          type: array
          items:
            type: string
      required: [title, problem]
    PackJobRecord:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          description: Unique job id
        type:
          type: string
          enum: [pack]
        status:
          type: string
          enum: [queued, running, completed, failed]
        createdAt:
          type: string
        updatedAt:
          type: string
        payload:
          $ref: '#/components/schemas/PackJobPayload'
        result:
          oneOf:
            - $ref: '#/components/schemas/PackJobResult'
            - type: 'null'
        error:
          type: string
      required: [id, type, status, createdAt, updatedAt, payload]
    TaskPackJobRecord:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          description: Unique job id
        type:
          type: string
          enum: [taskpack]
        status:
          type: string
          enum: [queued, running, completed, failed]
        createdAt:
          type: string
        updatedAt:
          type: string
        payload:
          $ref: '#/components/schemas/TaskPackJobPublicPayload'
        result:
          oneOf:
            - $ref: '#/components/schemas/TaskPackJobResult'
            - type: 'null'
        error:
          type: string
      required: [id, type, status, createdAt, updatedAt, payload]
    PackJobResult:
      type: object
      additionalProperties: false
      properties:
        createdAt:
          type: string
        repoId:
          type: string
        repoName:
          type: string
        repomixXmlPath:
          type: string
        promptPath:
          type: string
        summaryPath:
          type: string
        manifestPath:
          type: string
        publicIncludeEntries:
          type: array
          items:
            type: string
      required:
        [createdAt, repoId, repoName, repomixXmlPath, promptPath, summaryPath, manifestPath, publicIncludeEntries]
    TaskPackJobPublicPayload:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
      required: [title]
    TaskPackJobResult:
      type: object
      additionalProperties: false
      properties:
        createdAt:
          type: string
        title:
          type: string
        markdownPath:
          type: string
        jsonPath:
          type: string
      required: [createdAt, title, markdownPath, jsonPath]
    FileReadPayload:
      type: object
      additionalProperties: false
      properties:
        repoId:
          type: string
        path:
          type: string
          description: Relative text file path inside the mapped repository.
      required: [repoId, path]
    FileReadBatchPayload:
      type: object
      additionalProperties: false
      properties:
        repoId:
          type: string
        paths:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 10
      required: [repoId, paths]
    FileReadResult:
      type: object
      additionalProperties: false
      properties:
        path:
          type: string
        content:
          type: string
        truncated:
          type: boolean
        size:
          type: integer
        encoding:
          type: string
        returnedBytes:
          type: integer
        maxBytes:
          type: integer
        previewMode:
          type: string
          enum: [head]
      required: [path, content, truncated, size, encoding, returnedBytes, maxBytes, previewMode]
    JobArtifactSummary:
      type: object
      additionalProperties: false
      properties:
        key:
          type: string
          enum: [repomixXml, prompt, summary, manifest, markdown, json]
        label:
          type: string
        path:
          type: string
        contentType:
          type: string
      required: [key, label, path, contentType]
    JobArtifactReadResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        artifact:
          $ref: '#/components/schemas/JobArtifactSummary'
        file:
          $ref: '#/components/schemas/FileReadResult'
      required: [ok, artifact, file]
    JobArtifactsListResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/JobArtifactSummary'
      required: [ok, artifacts]
    ReadFileResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        repoId:
          type: string
        file:
          $ref: '#/components/schemas/FileReadResult'
      required: [ok, repoId, file]
    ReadFilesResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        repoId:
          type: string
        files:
          type: array
          items:
            $ref: '#/components/schemas/FileReadResult'
      required: [ok, repoId, files]
    PackJobSummary:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        type:
          type: string
          enum: [pack]
        status:
          type: string
          enum: [queued, running, completed, failed]
        createdAt:
          type: string
        updatedAt:
          type: string
        headline:
          type: string
        hasResult:
          type: boolean
        hasError:
          type: boolean
        payload:
          $ref: '#/components/schemas/PackJobPayload'
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/JobArtifactSummary'
        result:
          oneOf:
            - $ref: '#/components/schemas/PackJobResult'
            - type: 'null'
        error:
          type: string
      required: [id, type, status, createdAt, updatedAt, headline, hasResult, hasError, payload]
    TaskPackJobSummary:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        type:
          type: string
          enum: [taskpack]
        status:
          type: string
          enum: [queued, running, completed, failed]
        createdAt:
          type: string
        updatedAt:
          type: string
        headline:
          type: string
        hasResult:
          type: boolean
        hasError:
          type: boolean
        payload:
          $ref: '#/components/schemas/TaskPackJobPublicPayload'
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/JobArtifactSummary'
        result:
          oneOf:
            - $ref: '#/components/schemas/TaskPackJobResult'
            - type: 'null'
        error:
          type: string
      required: [id, type, status, createdAt, updatedAt, headline, hasResult, hasError, payload]
    CreatePackResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        job:
          $ref: '#/components/schemas/PackJobRecord'
      required: [ok, job]
    CreateTaskPackResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        job:
          $ref: '#/components/schemas/TaskPackJobRecord'
      required: [ok, job]
    JobsListResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        jobs:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/PackJobSummary'
              - $ref: '#/components/schemas/TaskPackJobSummary'
      required: [ok, jobs]
    GetJobResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        job:
          oneOf:
            - $ref: '#/components/schemas/PackJobSummary'
            - $ref: '#/components/schemas/TaskPackJobSummary'
      required: [ok, job]
paths:
  /api/health:
    get:
      operationId: health
      summary: Health check
      description: Returns the current TokenPilot control-plane health information.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/gpt/config:
    get:
      operationId: getGptConfig
      summary: Get the current GPT configuration recommendation
      description: Returns the current recommended GPT configuration, including version, update time, OpenAPI URL, schema import URL, and instructions text.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: GPT config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GptConfigResponse'
  /api/jobs/pack:
    post:
      operationId: createPack
      summary: Queue a repo bundle job
      description: Creates a queued pack job that produces a repomix bundle and bundle manifest for an approved repo alias. If repoId is omitted, the current default repo tokenpilot is used.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PackJobPayload'
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePackResponse'
  /api/jobs/taskpack:
    post:
      operationId: createTaskPack
      summary: Queue a Codex task pack job
      description: Creates a queued task-pack job from a structured problem description.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskPackJobPayload'
      responses:
        "200":
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTaskPackResponse'
  /api/jobs:
    get:
      operationId: listJobs
      summary: List queued and completed jobs
      description: Returns the current job list from the local TokenPilot queue.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Jobs list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobsListResponse'
  /api/jobs/{id}:
    get:
      operationId: getJob
      summary: Get a single job status
      description: Returns a single queued, running, completed, or failed job by id.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetJobResponse'
  /api/jobs/{id}/artifacts:
    get:
      operationId: listJobArtifacts
      summary: List public-safe artifacts for a job
      description: Returns the artifact entries declared by the selected job result.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Artifact list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobArtifactsListResponse'
  /api/jobs/{id}/artifacts/{artifactKey}:
    get:
      operationId: readJobArtifact
      summary: Read a public-safe artifact by key
      description: Reads a single text-like artifact that was declared by a completed job result.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: artifactKey
          in: path
          required: true
          schema:
            type: string
            enum: [repomixXml, prompt, summary, manifest, markdown, json]
      responses:
        "200":
          description: Artifact content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobArtifactReadResponse'
  /api/files/read:
    post:
      operationId: readFile
      summary: Read a single allowlisted text file
      description: Reads a single relative text file from an allowlisted repository mapping.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileReadPayload'
      responses:
        "200":
          description: File content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadFileResponse'
  /api/files/read-batch:
    post:
      operationId: readFiles
      summary: Read multiple allowlisted text files
      description: Reads up to 10 relative text files from an allowlisted repository mapping.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileReadBatchPayload'
      responses:
        "200":
          description: File contents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadFilesResponse'
