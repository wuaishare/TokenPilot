openapi: 3.1.0
info:
  title: TokenPilot Local Control Plane API
  version: 0.1.0-alpha
  description: >
    Local-first automation surface for TokenPilot. Phase 1 keeps execution local and
    preserves the existing manual workflow while exposing the future HTTPS control-plane shape.
servers:
  - url: https://tokenpilot.example.com
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        mode:
          type: string
        authRequired:
          type: boolean
      required: [ok, mode, authRequired]
    PackJobPayload:
      type: object
      additionalProperties: false
      properties:
        repoId:
          type: string
          description: Public repository alias resolved to a private local path by the operator.
      required: [repoId]
    TaskPackJobPayload:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
        problem:
          type: string
        contextSummary:
          type: string
        mustInspect:
          type: array
          items:
            type: string
        mayInspect:
          type: array
          items:
            type: string
        mustNotModify:
          type: array
          items:
            type: string
        verificationCommands:
          type: array
          items:
            type: string
        acceptanceCriteria:
          type: array
          items:
            type: string
      required: [title, problem]
    PackJobRecord:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          description: Unique job id
        type:
          type: string
          enum: [pack]
        status:
          type: string
          enum: [queued, running, completed, failed]
        createdAt:
          type: string
        updatedAt:
          type: string
        payload:
          $ref: '#/components/schemas/PackJobPayload'
        result:
          oneOf:
            - $ref: '#/components/schemas/PackJobResult'
            - type: 'null'
        error:
          type: string
      required: [id, type, status, createdAt, updatedAt, payload]
    TaskPackJobRecord:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          description: Unique job id
        type:
          type: string
          enum: [taskpack]
        status:
          type: string
          enum: [queued, running, completed, failed]
        createdAt:
          type: string
        updatedAt:
          type: string
        payload:
          $ref: '#/components/schemas/TaskPackJobPayload'
        result:
          oneOf:
            - $ref: '#/components/schemas/TaskPackJobResult'
            - type: 'null'
        error:
          type: string
      required: [id, type, status, createdAt, updatedAt, payload]
    PackJobResult:
      type: object
      additionalProperties: false
      properties:
        createdAt:
          type: string
        repoId:
          type: string
        repoName:
          type: string
        repomixXmlPath:
          type: string
        promptPath:
          type: string
        summaryPath:
          type: string
        publicIncludeEntries:
          type: array
          items:
            type: string
      required:
        [createdAt, repoId, repoName, repomixXmlPath, promptPath, summaryPath, publicIncludeEntries]
    TaskPackJobPublicPayload:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
      required: [title]
    TaskPackJobResult:
      type: object
      additionalProperties: false
      properties:
        createdAt:
          type: string
        title:
          type: string
        markdownPath:
          type: string
        jsonPath:
          type: string
      required: [createdAt, title, markdownPath, jsonPath]
    FileReadPayload:
      type: object
      additionalProperties: false
      properties:
        repoId:
          type: string
        path:
          type: string
          description: Relative text file path inside the mapped repository.
      required: [repoId, path]
    FileReadBatchPayload:
      type: object
      additionalProperties: false
      properties:
        repoId:
          type: string
        paths:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 10
      required: [repoId, paths]
    FileReadResult:
      type: object
      additionalProperties: false
      properties:
        path:
          type: string
        content:
          type: string
        truncated:
          type: boolean
        size:
          type: integer
        encoding:
          type: string
      required: [path, content, truncated, size, encoding]
    ReadFileResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        repoId:
          type: string
        file:
          $ref: '#/components/schemas/FileReadResult'
      required: [ok, repoId, file]
    ReadFilesResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        repoId:
          type: string
        files:
          type: array
          items:
            $ref: '#/components/schemas/FileReadResult'
      required: [ok, repoId, files]
    PackJobSummary:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        type:
          type: string
          enum: [pack]
        status:
          type: string
          enum: [queued, running, completed, failed]
        createdAt:
          type: string
        updatedAt:
          type: string
        payload:
          $ref: '#/components/schemas/PackJobPayload'
        result:
          oneOf:
            - $ref: '#/components/schemas/PackJobResult'
            - type: 'null'
        error:
          type: string
      required: [id, type, status, createdAt, updatedAt, payload]
    TaskPackJobSummary:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        type:
          type: string
          enum: [taskpack]
        status:
          type: string
          enum: [queued, running, completed, failed]
        createdAt:
          type: string
        updatedAt:
          type: string
        payload:
          $ref: '#/components/schemas/TaskPackJobPublicPayload'
        result:
          oneOf:
            - $ref: '#/components/schemas/TaskPackJobResult'
            - type: 'null'
        error:
          type: string
      required: [id, type, status, createdAt, updatedAt, payload]
    CreatePackResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        job:
          $ref: '#/components/schemas/PackJobRecord'
      required: [ok, job]
    CreateTaskPackResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        job:
          $ref: '#/components/schemas/TaskPackJobRecord'
      required: [ok, job]
    JobsListResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        jobs:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/PackJobSummary'
              - $ref: '#/components/schemas/TaskPackJobSummary'
      required: [ok, jobs]
    GetJobResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        job:
          oneOf:
            - $ref: '#/components/schemas/PackJobSummary'
            - $ref: '#/components/schemas/TaskPackJobSummary'
      required: [ok, job]
paths:
  /api/health:
    get:
      operationId: health
      summary: Health check
      description: Returns the current TokenPilot control-plane health information.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/jobs/pack:
    post:
      operationId: createPack
      summary: Queue a repo bundle job
      description: Creates a queued pack job that produces a repomix bundle and bundle manifest for an approved repo alias.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PackJobPayload'
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePackResponse'
  /api/jobs/taskpack:
    post:
      operationId: createTaskPack
      summary: Queue a Codex task pack job
      description: Creates a queued task-pack job from a structured problem description.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskPackJobPayload'
      responses:
        "200":
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTaskPackResponse'
  /api/jobs:
    get:
      operationId: listJobs
      summary: List queued and completed jobs
      description: Returns the current job list from the local TokenPilot queue.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Jobs list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobsListResponse'
  /api/jobs/{id}:
    get:
      operationId: getJob
      summary: Get a single job status
      description: Returns a single queued, running, completed, or failed job by id.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetJobResponse'
  /api/files/read:
    post:
      operationId: readFile
      summary: Read a single allowlisted text file
      description: Reads a single relative text file from an allowlisted repository mapping.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileReadPayload'
      responses:
        "200":
          description: File content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadFileResponse'
  /api/files/read-batch:
    post:
      operationId: readFiles
      summary: Read multiple allowlisted text files
      description: Reads up to 10 relative text files from an allowlisted repository mapping.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileReadBatchPayload'
      responses:
        "200":
          description: File contents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadFilesResponse'
