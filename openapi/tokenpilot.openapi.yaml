openapi: 3.1.0
info:
  title: TokenPilot Local Control Plane API
  version: 0.1.0-alpha
  description: >
    Local-first automation surface for TokenPilot. Phase 1 keeps execution local and
    preserves the existing manual workflow while exposing the future HTTPS control-plane shape.
servers:
  - url: https://tokenpilot.example.com
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        mode:
          type: string
        authRequired:
          type: boolean
        exposed:
          type: boolean
        publicBaseUrl:
          oneOf:
            - type: string
            - type: "null"
        openapiUrl:
          type: string
      required: [ok, mode, authRequired, exposed, publicBaseUrl, openapiUrl]
    GptConfig:
      type: object
      additionalProperties: false
      properties:
        version:
          type: string
        updatedAt:
          type: string
        actionHost:
          type: string
        openapiUrl:
          type: string
        publicBaseUrl:
          oneOf:
            - type: string
            - type: "null"
        schemaImportUrl:
          type: string
        instructions:
          type: string
        notes:
          type: array
          items:
            type: string
      required: [version, updatedAt, actionHost, openapiUrl, publicBaseUrl, schemaImportUrl, instructions, notes]
    GptConfigResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        config:
          $ref: '#/components/schemas/GptConfig'
      required: [ok, config]
    GitCommitSummary:
      type: object
      additionalProperties: false
      properties:
        hash:
          type: string
        shortHash:
          type: string
        subject:
          type: string
        committedAt:
          type: string
      required: [hash, shortHash, subject, committedAt]
    RecentCommitsResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        repoId:
          type: string
        commits:
          type: array
          items:
            $ref: '#/components/schemas/GitCommitSummary'
      required: [ok, repoId, commits]
    PackJobPayload:
      type: object
      additionalProperties: false
      properties:
        repoId:
          type: string
          description: Public repository alias resolved to a private local path by the operator. Defaults to tokenpilot in the current single-repo local-first setup.
    TaskPackJobPayload:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
        problem:
          type: string
        contextSummary:
          type: string
        mustInspect:
          type: array
          items:
            type: string
        mayInspect:
          type: array
          items:
            type: string
        mustNotModify:
          type: array
          items:
            type: string
        verificationCommands:
          type: array
          items:
            type: string
        acceptanceCriteria:
          type: array
          items:
            type: string
      required: [title, problem]
    CodexRunJobPayload:
      type: object
      additionalProperties: false
      properties:
        repoId:
          type: string
          description: Public repository alias resolved by the local allowlist. Defaults to tokenpilot.
        title:
          type: string
        instructions:
          type: string
          description: Task instructions passed to local Codex CLI.
        executionMode:
          type: string
          enum: [plan, review, develop]
          default: develop
        worktreePolicy:
          type: string
          enum: [auto, always, never]
          default: auto
        branchName:
          type: string
        approvalPolicy:
          type: string
          enum: [untrusted, on-request, never]
          default: never
        sandbox:
          type: string
          enum: [read-only, workspace-write, danger-full-access]
          default: workspace-write
        verificationCommands:
          type: array
          items:
            type: string
        acceptanceCriteria:
          type: array
          items:
            type: string
        commitPolicy:
          type: string
          enum: [none, propose, commit]
          default: propose
        commitTitle:
          type: string
        commitBody:
          type: string
      required: [title, instructions]
    PackJobRecord:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          description: Unique job id
        type:
          type: string
          enum: [pack]
        status:
          type: string
          enum: [queued, running, completed, failed]
        createdAt:
          type: string
        updatedAt:
          type: string
        payload:
          $ref: '#/components/schemas/PackJobPayload'
        result:
          oneOf:
            - $ref: '#/components/schemas/PackJobResult'
            - type: 'null'
        error:
          type: string
      required: [id, type, status, createdAt, updatedAt, payload]
    TaskPackJobRecord:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          description: Unique job id
        type:
          type: string
          enum: [taskpack]
        status:
          type: string
          enum: [queued, running, completed, failed]
        createdAt:
          type: string
        updatedAt:
          type: string
        payload:
          $ref: '#/components/schemas/TaskPackJobPublicPayload'
        result:
          oneOf:
            - $ref: '#/components/schemas/TaskPackJobResult'
            - type: 'null'
        error:
          type: string
      required: [id, type, status, createdAt, updatedAt, payload]
    CodexRunJobRecord:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          description: Unique job id
        type:
          type: string
          enum: [codex-run]
        status:
          type: string
          enum: [queued, running, completed, failed]
        createdAt:
          type: string
        updatedAt:
          type: string
        payload:
          $ref: '#/components/schemas/CodexRunJobPublicPayload'
        result:
          oneOf:
            - $ref: '#/components/schemas/CodexRunJobResult'
            - type: 'null'
        error:
          type: string
      required: [id, type, status, createdAt, updatedAt, payload]
    PackJobResult:
      type: object
      additionalProperties: false
      properties:
        createdAt:
          type: string
        repoId:
          type: string
        repoName:
          type: string
        repomixXmlPath:
          type: string
        promptPath:
          type: string
        summaryPath:
          type: string
        manifestPath:
          type: string
        publicIncludeEntries:
          type: array
          items:
            type: string
      required:
        [createdAt, repoId, repoName, repomixXmlPath, promptPath, summaryPath, manifestPath, publicIncludeEntries]
    TaskPackJobPublicPayload:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
      required: [title]
    CodexRunJobPublicPayload:
      type: object
      additionalProperties: false
      properties:
        repoId:
          type: string
        title:
          type: string
        executionMode:
          type: string
          enum: [plan, review, develop]
        worktreePolicy:
          type: string
          enum: [auto, always, never]
        commitPolicy:
          type: string
          enum: [none, propose, commit]
      required: [repoId, title]
    TaskPackJobResult:
      type: object
      additionalProperties: false
      properties:
        createdAt:
          type: string
        title:
          type: string
        markdownPath:
          type: string
        jsonPath:
          type: string
      required: [createdAt, title, markdownPath, jsonPath]
    CodexRunCommitResult:
      type: object
      additionalProperties: false
      properties:
        committed:
          type: boolean
        commitHash:
          type: string
        commitMessage:
          type: string
        error:
          type: string
      required: [committed]
    CodexRunJobResult:
      type: object
      additionalProperties: false
      properties:
        createdAt:
          type: string
        repoId:
          type: string
        title:
          type: string
        executionMode:
          type: string
          enum: [plan, review, develop]
        worktreePolicy:
          type: string
          enum: [auto, always, never]
        worktreeCreated:
          type: boolean
        branchName:
          type: string
        statusSummary:
          type: string
        codexExitCode:
          type: integer
        reviewExitCode:
          type: integer
        gitStatus:
          type: string
        hasDiff:
          type: boolean
        commit:
          $ref: '#/components/schemas/CodexRunCommitResult'
        promptPath:
          type: string
        stdoutPath:
          type: string
        stderrPath:
          type: string
        diffPath:
          type: string
        reviewPath:
          type: string
        summaryPath:
          type: string
      required:
        [createdAt, repoId, title, executionMode, worktreePolicy, worktreeCreated, statusSummary, codexExitCode, reviewExitCode, gitStatus, hasDiff, commit, promptPath, stdoutPath, stderrPath, diffPath, reviewPath, summaryPath]
    FileReadPayload:
      type: object
      additionalProperties: false
      properties:
        repoId:
          type: string
        path:
          type: string
          description: Relative text file path inside the mapped repository.
        offset:
          type: integer
          minimum: 0
          description: Optional byte offset for chunked reading.
        limit:
          type: integer
          minimum: 1
          description: Optional maximum byte count for chunked reading.
      required: [repoId, path]
    FileReadBatchPayload:
      type: object
      additionalProperties: false
      properties:
        repoId:
          type: string
        paths:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 10
      required: [repoId, paths]
    FileReadResult:
      type: object
      additionalProperties: false
      properties:
        path:
          type: string
        content:
          type: string
        truncated:
          type: boolean
        size:
          type: integer
        encoding:
          type: string
        returnedBytes:
          type: integer
        maxBytes:
          type: integer
        previewMode:
          type: string
          enum: [head]
        offset:
          type: integer
        nextOffset:
          oneOf:
            - type: integer
            - type: "null"
        eof:
          type: boolean
      required: [path, content, truncated, size, encoding, returnedBytes, maxBytes, previewMode, offset, nextOffset, eof]
    JobArtifactSummary:
      type: object
      additionalProperties: false
      properties:
        key:
          type: string
          enum: [repomixXml, prompt, summary, manifest, markdown, json, codexPrompt, codexStdout, codexStderr, codexDiff, codexReview, codexSummary]
        label:
          type: string
        path:
          type: string
        contentType:
          type: string
      required: [key, label, path, contentType]
    JobArtifactReadResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        artifact:
          $ref: '#/components/schemas/JobArtifactSummary'
        file:
          $ref: '#/components/schemas/FileReadResult'
      required: [ok, artifact, file]
    JobArtifactsListResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/JobArtifactSummary'
      required: [ok, artifacts]
    ReadFileResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        repoId:
          type: string
        file:
          $ref: '#/components/schemas/FileReadResult'
      required: [ok, repoId, file]
    ReadFilesResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        repoId:
          type: string
        files:
          type: array
          items:
            $ref: '#/components/schemas/FileReadResult'
      required: [ok, repoId, files]
    PackJobSummary:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        type:
          type: string
          enum: [pack]
        status:
          type: string
          enum: [queued, running, completed, failed]
        createdAt:
          type: string
        updatedAt:
          type: string
        headline:
          type: string
        hasResult:
          type: boolean
        hasError:
          type: boolean
        payload:
          $ref: '#/components/schemas/PackJobPayload'
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/JobArtifactSummary'
        result:
          oneOf:
            - $ref: '#/components/schemas/PackJobResult'
            - type: 'null'
        error:
          type: string
      required: [id, type, status, createdAt, updatedAt, headline, hasResult, hasError, payload]
    TaskPackJobSummary:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        type:
          type: string
          enum: [taskpack]
        status:
          type: string
          enum: [queued, running, completed, failed]
        createdAt:
          type: string
        updatedAt:
          type: string
        headline:
          type: string
        hasResult:
          type: boolean
        hasError:
          type: boolean
        payload:
          $ref: '#/components/schemas/TaskPackJobPublicPayload'
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/JobArtifactSummary'
        result:
          oneOf:
            - $ref: '#/components/schemas/TaskPackJobResult'
            - type: 'null'
        error:
          type: string
      required: [id, type, status, createdAt, updatedAt, headline, hasResult, hasError, payload]
    CodexRunJobSummary:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        type:
          type: string
          enum: [codex-run]
        status:
          type: string
          enum: [queued, running, completed, failed]
        createdAt:
          type: string
        updatedAt:
          type: string
        headline:
          type: string
        hasResult:
          type: boolean
        hasError:
          type: boolean
        payload:
          $ref: '#/components/schemas/CodexRunJobPublicPayload'
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/JobArtifactSummary'
        result:
          oneOf:
            - $ref: '#/components/schemas/CodexRunJobResult'
            - type: 'null'
        error:
          type: string
      required: [id, type, status, createdAt, updatedAt, headline, hasResult, hasError, payload]
    CreatePackResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        job:
          $ref: '#/components/schemas/PackJobRecord'
      required: [ok, job]
    CreateTaskPackResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        job:
          $ref: '#/components/schemas/TaskPackJobRecord'
      required: [ok, job]
    CreateCodexRunResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        job:
          $ref: '#/components/schemas/CodexRunJobRecord'
      required: [ok, job]
    JobControlResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        jobId:
          type: string
        action:
          type: string
        state:
          type: string
        message:
          type: string
      required: [ok, jobId, action, state, message]
    JobsListResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        jobs:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/PackJobSummary'
              - $ref: '#/components/schemas/TaskPackJobSummary'
              - $ref: '#/components/schemas/CodexRunJobSummary'
      required: [ok, jobs]
    GetJobResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
        job:
          oneOf:
            - $ref: '#/components/schemas/PackJobSummary'
            - $ref: '#/components/schemas/TaskPackJobSummary'
            - $ref: '#/components/schemas/CodexRunJobSummary'
      required: [ok, job]
paths:
  /api/health:
    get:
      operationId: health
      summary: Health check
      description: Returns the current TokenPilot control-plane health information.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/gpt/config:
    get:
      operationId: getGptConfig
      summary: Get the current GPT configuration recommendation
      description: Returns the current recommended GPT configuration, including version, update time, OpenAPI URL, schema import URL, and instructions text.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: GPT config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GptConfigResponse'
  /api/git/recent-commits:
    get:
      operationId: getRecentCommits
      summary: Get recent git commit summaries
      description: Returns recent commit metadata so GPT and operators can inspect the latest repository changes without reading the full git history.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Recent commits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecentCommitsResponse'
  /api/jobs/pack:
    post:
      operationId: createPack
      summary: Queue a repo bundle job
      description: Creates a queued pack job that produces a repomix bundle and bundle manifest for an approved repo alias. If repoId is omitted, the current default repo tokenpilot is used.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PackJobPayload'
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePackResponse'
  /api/jobs/taskpack:
    post:
      operationId: createTaskPack
      summary: Queue a Codex task pack job
      description: Creates a queued task-pack job from a structured problem description.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskPackJobPayload'
      responses:
        "200":
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTaskPackResponse'
  /api/jobs/codex-run:
    post:
      operationId: createCodexRun
      summary: Queue a local Codex CLI execution job
      description: Creates a queued write-side job that the local runner executes through Codex CLI in an allowlisted repo. This is not a raw shell endpoint.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CodexRunJobPayload'
      responses:
        "200":
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCodexRunResponse'
  /api/jobs:
    get:
      operationId: listJobs
      summary: List queued and completed jobs
      description: Returns the current job list from the local TokenPilot queue.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Jobs list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobsListResponse'
  /api/jobs/{id}:
    get:
      operationId: getJob
      summary: Get a single job status
      description: Returns a single queued, running, completed, or failed job by id.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetJobResponse'
  /api/jobs/{id}/artifacts:
    get:
      operationId: listJobArtifacts
      summary: List public-safe artifacts for a job
      description: Returns the artifact entries declared by the selected job result.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Artifact list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobArtifactsListResponse'
  /api/jobs/{id}/artifacts/{artifactKey}:
    get:
      operationId: readJobArtifact
      summary: Read a public-safe artifact by key
      description: Reads a single text-like artifact that was declared by a completed job result.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: artifactKey
          in: path
          required: true
          schema:
            type: string
            enum: [repomixXml, prompt, summary, manifest, markdown, json, codexPrompt, codexStdout, codexStderr, codexDiff, codexReview, codexSummary]
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Artifact content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobArtifactReadResponse'
  /api/jobs/{id}/control/{action}:
    post:
      operationId: controlJob
      summary: Pause, resume, or terminate a tracked local job process
      description: Sends process-control signals to the local runner's tracked Codex process. Supported actions are pause, resume, and terminate.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [pause, resume, terminate]
      responses:
        "200":
          description: Control result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobControlResponse'
  /api/jobs/control/terminate-all:
    post:
      operationId: terminateAllJobs
      summary: Terminate all tracked local Codex job processes
      description: Emergency stop for TokenPilot-tracked Codex job processes. This is not a raw shell endpoint.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Termination summary
          content:
            application/json:
              schema:
                type: object
  /api/files/read:
    post:
      operationId: readFile
      summary: Read a single allowlisted text file
      description: Reads a single relative text file from an allowlisted repository mapping.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileReadPayload'
      responses:
        "200":
          description: File content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadFileResponse'
  /api/files/read-batch:
    post:
      operationId: readFiles
      summary: Read multiple allowlisted text files
      description: Reads up to 10 relative text files from an allowlisted repository mapping.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileReadBatchPayload'
      responses:
        "200":
          description: File contents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadFilesResponse'
