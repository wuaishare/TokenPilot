# TokenPilot expected nginx routing shape for a ServBay-hosted public entrypoint.
#
# This file is intentionally generic and placeholder-first. It is not a drop-in
# production config with real certificates or private paths. Its purpose is to
# define the routing invariants that must stay true for the HTTPS GPT-facing
# loop to remain stable over time.
#
# Required invariants:
#
# 1. /api/* must be proxied to the local TokenPilot control plane
#    at http://127.0.0.1:4318
# 2. /openapi.yaml must be proxied to the same local control plane
# 3. /ui and /ui/* must be proxied to the same local control plane
# 4. /favicon.ico should not fall through to a static-site 404 path
# 5. The site must not rely on a static root-only try_files fallback for
#    control-plane paths
#
# Placeholder routing example:
#
# server {
#   listen 443 ssl;
#   server_name tokenpilot.example.com;
#
#   location /api/ {
#     proxy_pass http://127.0.0.1:4318;
#   }
#
#   location = /openapi.yaml {
#     proxy_pass http://127.0.0.1:4318/openapi.yaml;
#   }
#
#   location /ui/ {
#     proxy_pass http://127.0.0.1:4318;
#   }
#
#   location = /ui {
#     proxy_pass http://127.0.0.1:4318/ui;
#   }
#
#   location = /favicon.ico {
#     proxy_pass http://127.0.0.1:4318/favicon.ico;
#   }
# }
